name: Chameleon Expansion
on:
  schedule:
    - cron: '0 13 * * *' # Runs at 9:00 AM EST
  workflow_dispatch: 

# This clears the Node.js 20 warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyGithub
        run: pip install PyGithub

      - name: Run Expansion
        env:
          CHAMELEON_TOKEN: ${{ secrets.CHAMELEON_TOKEN }}
        run: python master_expander.py

      - name: Auto-Commit Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Tax Hub Update: $(date)"
