name: Chameleon Expansion
on:
  schedule:
    - cron: '0 13 * * *' # 9:00 AM EST Daily
  workflow_dispatch: # Allows manual test runs

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: pip install PyGithub
      - name: Run Expansion
        env:
          # This line connects the Secret you just made to the Python script
          CHAMELEON_TOKEN: ${{ secrets.CHAMELEON_TOKEN }}
        run: python master_expander.py
      - name: Sync Keyword Progress
        run: |
          git config --global user.name 'Chameleon-Bot'
          git config --global user.email 'bot@chameleon.marketer'
          git add keywords.json
          git commit -m "Automated Content Injection: $(date)"
          git push
