name: Chameleon Expansion
on:
  workflow_dispatch: # This is the manual 'Run' button

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyGithub
        run: pip install PyGithub

      - name: Run Expansion
        env:
          # Check this name against your Secrets page!
          CHAMELEON_TOKEN: ${{ secrets.CHAMELEON_TOKEN }}
        run: python master_expander.py

      - name: Sync Keywords
        run: |
          git config --global user.name 'Chameleon-Bot'
          git config --global user.email 'bot@chameleon.marketer'
          git add keywords.json
          git commit -m "Update Keywords" || echo "No changes"
          git push
